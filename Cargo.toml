[package]
name = "axon"
version = "0.1.0"
edition = "2021"

[dependencies]
ouros = { git = "https://github.com/parcadei/ouros" }
genai = "0.5"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive", "env"] }
regex = "1"
anyhow = "1"

[dev-dependencies]
tempfile = "3"
